title: Innersync Documentation
description: Central documentation hub for all Innersync services.
remote_theme: just-the-docs/just-the-docs@v0.10.1
markdown: kramdown

url: "https://docs.innersync.tech"
baseurl: ""
exclude:
  - CLAUDE.md

# Just the Docs configuration
search_enabled: true
search_tokenizer_separator: /[\s/]+/

aux_links:
  "GitHub":
    - "https://github.com/innersync-tech/docs"

aux_links_new_tab: true

footer_content: "&copy; 2026 Innersync. All rights reserved."

color_scheme: dark

# Navigation order
nav_sort: order
nav_fold: true

defaults:
  - scope:
      path: "alphapy"
      type: "pages"
    values:
      layout: default
      parent: Alphapy
  - scope:
      path: "alphapy/index.md"
      type: "pages"
    values:
      parent:
      has_children: true
      nav_order: 2
      permalink: /alphapy/

plugins:
  - jekyll-remote-theme
  - jekyll-seo-tag
