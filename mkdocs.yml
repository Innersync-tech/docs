site_name: Innersync Documentation
site_description: Central documentation hub for all Innersync services.
site_url: https://docs.innersync.tech
repo_url: https://github.com/Innersync-tech/docs
repo_name: Innersync-tech/docs
docs_dir: docs

exclude_docs: |
  alphapy/legal.md
  alphapy/privacy-policy.md
  alphapy/terms-of-service.md
  alphapy/pricing.md

theme:
  name: material
  palette:
    scheme: slate
    primary: blue
    accent: blue
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true

plugins:
  - search

nav:
  - Home: index.md
  - Alphapy:
      - Overview: alphapy/index.md
      - Configuration: alphapy/configuration.md
      - Commands: alphapy/commands.md
      - API Reference: alphapy/api.md
      - Premium: alphapy/premium.md
      - Database Schema: alphapy/database-schema.md
      - Migrations: alphapy/migrations.md
      - Authentication: alphapy/ALPHAPY_AUTHENTICATION.md
      - Operational Playbook: alphapy/OPERATIONAL_PLAYBOOK.md
      - Security: alphapy/SECURITY.md
      - Google Credentials Setup: alphapy/GOOGLE_CREDENTIALS_SETUP.md
      - Railway Secret Manager: alphapy/RAILWAY_SECRET_MANAGER_SETUP.md
  - Legal:
      - Legal Information: legal/legal.md
      - Terms of Service: legal/terms-of-service.md
      - Privacy Policy: legal/privacy-policy.md
      - Pricing: legal/pricing.md
  - App: app/index.md
  - Core: core/index.md
